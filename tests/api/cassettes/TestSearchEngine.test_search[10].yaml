        src=\"/images/other/xml.png\" border=0 alt=\"RSS\" title=\"Torrents RSS\"></a>
        Torrent Archive</th>\n        </tr>\n        <tr>\n          <td style=\"border:
        0px;\" valign=\"top\" class=\"News1\">\n          <blockquote>\n          Bittorrent
        is a powerful peer-to-peer file sharing technology which makes transferring
        large files with many people easier. Large files, such as ISO images, can
        be shared more quickly among groups of people because each person downloading
        the file can also help share it with others. This takes a lot of the burden
        of providing network bandwidth off the publisher.\n          <br><br>\n          In
        an effort to help the open source community, DistroWatch shares (or \"seeds\")
        stable releases of distributions, generally for a week after the new version
        of the distribution is released. The torrents we are hosting are listed in
        our <a href=\"weekly.php?issue=current\">weekly newsletter</a>. An archive
        of past torrents we have seeded can be found below.\n          <br><br>\n
        \         Should you wish to upload your own Linux or BSD torrents and have
        them added to this list, please visit our <a href=\"dwres.php?resource=upload-torrent\">Upload
        Torrent</a> page.\n          <br><br>\n\n          <center>\n          <form
        name=torrent method=get>\n            <input type=hidden name=resource value=\"bittorrent\">\n
        \           <select name=sortorder>\n               <option value=\"name\">Sort
